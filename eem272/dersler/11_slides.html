-prettylights-syntax-markup-italic);font-style:italic}div#\:\$p > svg > foreignObject > section :is(pre, marp-pre) :where(.hljs-strong){color:var(--color-prettylights-syntax-markup-bold);font-weight:700}div#\:\$p > svg > foreignObject > section :is(pre, marp-pre) :where(.hljs-addition){background-color:var(--color-prettylights-syntax-markup-inserted-bg);color:var(--color-prettylights-syntax-markup-inserted-text)}div#\:\$p > svg > foreignObject > section :is(pre, marp-pre) :where(.hljs-deletion){background-color:var(--color-prettylights-syntax-markup-deleted-bg);color:var(--color-prettylights-syntax-markup-deleted-text)}div#\:\$p > svg > foreignObject > section footer,div#\:\$p > svg > foreignObject > section header{color:var(--header-footer-color);font-size:18px;left:30px;margin:0;position:absolute}div#\:\$p > svg > foreignObject > section header{top:21px}div#\:\$p > svg > foreignObject > section footer{bottom:21px}div#\:\$p > svg > foreignObject > section{--h1-color:light-dark(#246, #cee7ff);--header-footer-color:light-dark(hsla(0,0%,40%,.75), hsla(0,0%,60%,.75));--heading-strong-color:light-dark(#48c, #7bf);--paginate-color:light-dark(#777, #999);--base-size-4:4px;--base-size-8:8px;--base-size-16:16px;--base-size-24:24px;--base-size-40:40px;align-items:stretch;display:block;flex-flow:column nowrap;font-size:29px;height:720px;padding:78.5px;place-content:safe center center;width:1280px}div#\:\$p > svg > foreignObject > section{--marpit-root-font-size:29px}div#\:\$p > svg > foreignObject > section>:last-child,div#\:\$p > svg > foreignObject > section[data-footer]>:nth-last-child(2){margin-bottom:0}div#\:\$p > svg > foreignObject > section>:first-child,div#\:\$p > svg > foreignObject > section>header:first-child+*{margin-top:0}div#\:\$p > svg > foreignObject > section:after{bottom:21px;color:var(--paginate-color);font-size:24px;padding:0;position:absolute;right:30px}div#\:\$p > svg > foreignObject > section:after{--marpit-root-font-size:24px}div#\:\$p > svg > foreign </style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" lang="tr-TR">
<h1 id="e%C4%9Fitim---do%C4%9Frulama---test-setleri-train---validation---test">Eğitim - Doğrulama - Test setleri (Train - Validation - Test)</h1>
<p>Makine öğrenmesinde veri seti genellikle üçe ayrılır:</p>
<ul>
<li><strong>Train (Eğitim) Seti</strong>
<ul>
<li>Modelin öğrenmesi için kullanılır.</li>
</ul>
</li>
<li><strong>Validation (Doğrulama) Seti</strong>
<ul>
<li>Hiperparametre ayarı ve model seçimi için kullanılır.</li>
</ul>
</li>
<li><strong>Test Seti</strong>
<ul>
<li>Modelin gerçek performansını ölçmek için kullanılır.</li>
</ul>
</li>
</ul>
<p>Amaç: Modelin sadece veriyi ezberlemesini (overfitting) engelleyerek genelleme yeteneğini ölçmek.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="tr-TR">
<h1 id="neden-veri-b%C3%B6lme-yap%C4%B1l%C4%B1r">Neden Veri Bölme Yapılır?</h1>
<ul>
<li>
<p>Model tüm veriyi görürse: Gerçek hayatta başarısız olabilir (overfitting).</p>
</li>
<li>
<p>Validation set: En iyi modeli seçmek için kullanılır.</p>
</li>
<li>
<p>Test set:</p>
<ul>
<li>En son aşamada, modelin gerçek başarımını ölçer.</li>
<li>Eğitim sürecine dahil edilmez.</li>
</ul>
</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.model_selection <span class="hljs-keyword">import</span> train_test_split
<span class="hljs-comment"># %80 train, %20 test</span>
X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=<span class="hljs-number">0.2</span>, random_state=<span class="hljs-number">42</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="tr-TR">
<h1 id="gradient-descent-gradyan-i%CC%87ni%C5%9Fi-nedir">Gradient Descent (Gradyan İnişi) Nedir?</h1>
<p>Gradient Descent, bir makine öğrenimi modelinin hata oranını en aza indirmek için kullanılan optimizasyon algoritmasıdır.</p>
<p>Amaç: Modelin tahmin hatasını düşürmek için ağırlıkları güncelleyerek en düşük kayıp fonksiyonunu bulmak.<br />
Nasıl çalışır?</p>
<ul>
<li>Ağırlıklar belirlenir.</li>
<li>Kaybın (hata oranının) ne kadar büyük olduğu hesaplanır.</li>
<li>Hata en aza inene kadar ağırlıklar küçük adımlarla güncellenir.</li>
<li>Öğrenme oranı (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.448ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 640 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D6FC" d="M34 156Q34 270 120 356T309 442Q379 442 421 402T478 304Q484 275 485 237V208Q534 282 560 374Q564 388 566 390T582 393Q603 393 603 385Q603 376 594 346T558 261T497 161L486 147L487 123Q489 67 495 47T514 26Q528 28 540 37T557 60Q559 67 562 68T577 70Q597 70 597 62Q597 56 591 43Q579 19 556 5T512 -10H505Q438 -10 414 62L411 69L400 61Q390 53 370 41T325 18T267 -2T203 -11Q124 -11 79 39T34 156ZM208 26Q257 26 306 47T379 90L403 112Q401 255 396 290Q382 405 304 405Q235 405 183 332Q156 292 139 224T121 120Q121 71 146 49T208 26Z"></path></g></g></g></svg></mjx-container>) güncelleme hızını belirler.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="tr-TR">
<h1 id="adam-adaptive-moment-estimation-nedir">Adam (Adaptive Moment Estimation) Nedir?</h1>
<p>Adam, derin öğrenme modellerinde yaygın olarak kullanılan, adaptif öğrenme oranına sahip bir optimizasyon algoritmasıdır.</p>
<p>Amaç: Her parametre için öğrenme oranını dinamik olarak ayarlayarak daha hızlı ve kararlı bir şekilde en düşük kayıp değerine ulaşmak.</p>
<ul>
<li>Parametreler bu adaptif oranlarla güncellenir.</li>
<li>Hızlı yakınsama sağlar.</li>
<li>Gürültülü ve seyrek verilerde iyi performans gösterir.</li>
<li>Öğrenme oranını otomatik olarak ayarladığı için daha az manuel ayar gerektirir.</li>
<li>Derin öğrenme modellerinde, büyük ve karmaşık veri setlerinde kullanılır.</li>
<li>SGD’ye göre daha hızlı ve stabil sonuç verir.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="tr-TR">
<h1 id="batch-gradient-descent-veri-k%C3%BCmesi-gradyan-i%CC%87ni%C5%9Fi">Batch Gradient Descent (Veri Kümesi Gradyan İnişi)</h1>
<ul>
<li>
<p>Tüm eğitim verisi kullanılır.</p>
</li>
<li>
<p>Her iterasyonda tüm veri kümesiyle hesaplama yapılır.</p>
</li>
<li>
<p>Kesin ama yavaş bir yöntemdir.</p>
</li>
<li>
<p>Avantajları:</p>
<ul>
<li>Daha doğru gradyan hesaplaması yapar.</li>
<li>Küçük veri kümelerinde iyi çalışır.</li>
</ul>
</li>
<li>
<p>Dezavantajları:</p>
<ul>
<li>Büyük veri kümelerinde çok yavaş olur.</li>
<li>Bellek kullanımı yüksektir.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="tr-TR">
<h1 id="stochastic-gradient-descent-sgd---tekil-%C3%B6rnekli-gradyan-i%CC%87ni%C5%9Fi">Stochastic Gradient Descent (SGD - Tekil Örnekli Gradyan İnişi)</h1>
<ul>
<li>
<p>Her iterasyonda yalnızca bir veri örneğiyle hesaplama yapılır.</p>
</li>
<li>
<p>Daha hızlıdır ama daha az kararlıdır.</p>
</li>
<li>
<p>Hata yüzeyi üzerinde daha rastgele hareket eder.</p>
</li>
<li>
<p>Avantajları:</p>
<ul>
<li>Az bellek kullanır. Hızlıdır.</li>
</ul>
</li>
<li>
<p>Dezavantajları:</p>
<ul>
<li>Gradyanlar düzensiz hareket eder, bazen yanlış yönde ilerleyebilir.</li>
<li>Daha fazla dalgalanma (oscillation) olabilir.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="tr-TR">
<h1 id="mini-batch-gradient-descent-k%C3%BC%C3%A7%C3%BCk-veri-k%C3%BCmesi-gradyan-i%CC%87ni%C5%9Fi">Mini-Batch Gradient Descent (Küçük Veri Kümesi Gradyan İnişi)</h1>
<ul>
<li>
<p>Tüm veri yerine küçük gruplar (mini-batches) halinde çalışır.</p>
</li>
<li>
<p>Batch ve SGD yöntemlerinin en iyi yönlerini birleştirir.</p>
</li>
<li>
<p>Dengeyi sağlayan en yaygın kullanılan yöntemdir!</p>
</li>
<li>
<p>Avantajları:</p>
<ul>
<li>Bellek kullanımı batch yöntemine göre daha iyidir.</li>
<li>SGD'ye göre daha kararlı sonuçlar verir.</li>
<li>Paralel hesaplama ile hızlandırılabilir.</li>
</ul>
</li>
<li>
<p>Dezavantajları:</p>
<ul>
<li>Batch kadar doğru olmayabilir.</li>
<li>Mini-batch boyutu iyi seçilmezse performans düşebilir.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="tr-TR">
<h1 id="hangi-y%C3%B6ntemi-kullanmal%C4%B1y%C4%B1z">Hangi Yöntemi Kullanmalıyız?</h1>
<ul>
<li>Küçük veri setleri için → Batch Gradient Descent</li>
<li>Gerçek zamanlı öğrenme için → SGD</li>
<li>Büyük veri ve dengeli performans için → Mini-Batch Gradient Descent</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="tr-TR">
<h1 id="epoch">Epoch</h1>
<ul>
<li>Modelin tüm verilerle 1 kez eğitilmesine 1 epoch denilir.</li>
<li>Örneğin veri sayısı 10.000, batch size 1000 epoch 5 ise
<ul>
<li>her 1000 veride 1 geri yayılım yapılır.</li>
<li>toplam 50 geri yayılım</li>
</ul>
</li>
<li>Epoch sayısı çok düşükse, model yetersiz öğrenir (underfitting).</li>
<li>Epoch sayısı çok yüksekse, model ezberleyebilir (overfitting).</li>
<li>Genellikle erken durdurma (early stopping) gibi yöntemlerle en uygun epoch sayısı bulunur.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="tr-TR">
<h1 id="batch-vs-mini-batch-vs-sgd">Batch vs Mini-Batch vs SGD</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-Python"><span class="hljs-comment"># Batch Gradient Descent</span>
model.fit(X, y, epochs=<span class="hljs-number">10</span>, batch_size=<span class="hljs-built_in">len</span>(X))

<span class="hljs-comment"># Stochastic Gradient Descent (SGD)</span>
model.fit(X, y, epochs=<span class="hljs-number">10</span>, batch_size=<span class="hljs-number">1</span>)

<span class="hljs-comment"># Mini-Batch Gradient Descent</span>
model.fit(X, y, epochs=<span class="hljs-number">10</span>, batch_size=<span class="hljs-number">32</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="tr-TR">
<h1 id="parametre---hiperparametre">Parametre - Hiperparametre</h1>
<ul>
<li><strong>Parametreler</strong> model tarafından eğitim esnasında öğrenilen değerlerdir.</li>
<li>Bir yapay sinir ağında ağırlıklar (weights) ve biaslar parametrelerdir.
<ul>

<h2 id="mse-mae-mape-hesaplama">MSE, MAE, MAPE Hesaplama</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-Python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

y_true = np.array([<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>, <span class="hljs-number">40</span>, <span class="hljs-number">50</span>])
y_pred = np.array([<span class="hljs-number">12</span>, <span class="hljs-number">18</span>, <span class="hljs-number">33</span>, <span class="hljs-number">37</span>, <span class="hljs-number">55</span>])

mse = np.mean((y_true - y_pred)**<span class="hljs-number">2</span>)
mae = np.mean(np.<span class="hljs-built_in">abs</span>(y_true - y_pred))
mape = np.mean(np.<span class="hljs-built_in">abs</span>((y_true - y_pred) / y_true)) * <span class="hljs-number">100</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;MSE:&quot;</span>, mse)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;MAE:&quot;</span>, mae)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;MAPE:&quot;</span>, mape)
</code></pre>
</section>

<h1 id="s%C4%B1n%C4%B1fland%C4%B1rma-metrikleri-ve-form%C3%BClleri"><strong>Sınıflandırma Metrikleri ve Formülleri</strong></h1>
<h2 id="tp-tn-fp-fn-kavramlar%C4%B1"><strong>TP, TN, FP, FN Kavramları</strong></h2>
<ul>
<li>True Positive (TP) - Gerçek Pozitif
<ul>
<li>Modelin &quot;Pozitif&quot; tahmin ettiği ve gerçekten pozitif olan örneklerdir.</li>
</ul>
</li>
<li>True Negative (TN) - Gerçek Negatif
<ul>
<li>Modelin &quot;Negatif&quot; tahmin ettiği ve gerçekten negatif olan örneklerdir.</li>
</ul>
</li>
<li>False Positive (FP) - Yanlış Pozitif
<ul>
<li>Modelin &quot;Pozitif&quot; tahmin ettiği ama aslında negatif olan örneklerdir.</li>
</ul>
</li>
<li>False Negative (FN) - Yanlış Negatif<br />
-Modelin &quot;Negatif&quot; tahmin ettiği ama aslında pozitif olan örneklerdir.</li>
</ul>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-Python"><span class="hljs-keyword">from</span> sklearn.metrics <span class="hljs-keyword">import</span> accuracy_score, precision_score, recall_score, f1_score

y_true = [<span class="hljs-number">1</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">1</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">0</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">1</span>]

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Accuracy:&quot;</span>, accuracy_score(y_true, y_pred))

<h2 id="kar%C4%B1%C5%9F%C4%B1kl%C4%B1k-matrisi-%C3%B6rnek">Karışıklık Matrisi Örnek</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-Python"><span class="hljs-comment"># Confusion Matrix (4 Sınıf) - Örnek Kod</span>
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt
<span class="hljs-keyword">from</span> sklearn.metrics <span class="hljs-keyword">import</span> confusion_matrix, ConfusionMatrixDisplay

<span class="hljs-comment"># Gerçek sınıflar (0,1,2,3)</span>
y_true = np.array([<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>])
<span class="hljs-comment"># Tahminler</span>
y_pred = np.array([<span class="hljs-number">0</span>,<span class="hljs-number">2</span>,<span class="hljs-number">1</span>,<span class="hljs-number">3</span>,<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">2</span>,<span class="hljs-number">0</span>,<span class="hljs-number">0</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>])

<span class="hljs-comment"># Confusion Matrix hesaplama</span>
cm = confusion_matrix(y_true, y_pred)
<span class="hljs-comment"># Görselleştirme</span>
disp = ConfusionMatrixDisplay(confusion_matrix=cm,
                              display_labels=[<span class="hljs-number">0</span>,<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>])

disp.plot(cmap=<span class="hljs-string">&#x27;Blues&#x27;</span>)
plt.title(<span class="hljs-string">&quot;4 Sınıflı Confusion Matrix&quot;</span>)
plt.show()
</code></pre>
</section>
